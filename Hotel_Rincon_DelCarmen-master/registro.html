<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrarse - Hotel Rincón del Carmen</title>
    
    <link rel="stylesheet" href="./CSS/styles.css" />
    <link rel="stylesheet" href="./CSS/responsive.css" />
    <link rel="stylesheet" href="./CSS/estilacos.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="logo">
                <img src="img/hotel/logo/logo.png" alt="logo del hotel">
            </a>
            <nav class="nav-links">
                <a href="index.html">Inicio</a>
                <a href="reservas.html">Reservas</a>
                <a href="contacto.html">Contacto</a>
                <div id="navAuth"></div>
            </nav>
        </div>
    </header>

    <main class="auth-section">
        <div class="auth-form-container">
            <h1>Registrarse</h1>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="registerName">Nombre Completo</label>
                    <input type="text" id="registerName" class="input" required>
                </div>
                <div class="form-group">
                    <label for="registerId">Número de Identificación</label>
                    <input type="text" id="registerId" class="input" required>
                </div>
                <div class="form-group">
                    <label for="registerNationality">Nacionalidad</label>
                    <input type="text" id="registerNationality" class="input" required>
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" class="input" required>
                </div>
                <div class="form-group">
                    <label for="registerPhone">Teléfono</label>
                    <input type="tel" id="registerPhone" class="input" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Contraseña</label>
                    <input type="password" id="registerPassword" class="input" required>
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="registerConfirmPassword" class="input" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Registrarse</button>
            </form>

            <p class="auth-link">
                ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
            </p>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div style="text-align: center;">
                <h3>Hotel Rincón del Carmen</h3>
                <p>Tu mejor experiencia de descanso y comodidad.</p>
            </div>
            <div class="footer-bottom">
                <p>Email: hotelrincon@gmail.com | Tel: 321 226 0838 | Cúcuta - Colombia</p>
            </div>
        </div>
    </footer>

<script src="JS/storage.js"></script>
<script src="JS/utils.js"></script>
<script src="JS/auth.js"></script>
<script src="JS/registro.js"></script>
</body>
</html>
